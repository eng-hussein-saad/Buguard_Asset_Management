services:
  api:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      CACHE_URL: ${CACHE_URL}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS}
      RATE_LIMIT_LOGIN_ATTEMPTS: ${RATE_LIMIT_LOGIN_ATTEMPTS}
      RATE_LIMIT_REFRESH_ATTEMPTS: ${RATE_LIMIT_REFRESH_ATTEMPTS}
      RATE_LIMIT_BULK_IMPORT_ATTEMPTS: ${RATE_LIMIT_BULK_IMPORT_ATTEMPTS}
      RATE_LIMIT_AI_ANALYSIS_ATTEMPTS: ${RATE_LIMIT_AI_ANALYSIS_ATTEMPTS}
      ANALYSIS_PROVIDER: ${ANALYSIS_PROVIDER}
      ANALYSIS_MODEL: ${ANALYSIS_MODEL}
      ANALYSIS_API_KEY: ${ANALYSIS_API_KEY}
      ANALYSIS_BASE_URL: ${ANALYSIS_BASE_URL}
      ANALYSIS_HTTP_REFERER: ${ANALYSIS_HTTP_REFERER}
      ANALYSIS_APP_TITLE: ${ANALYSIS_APP_TITLE}
      ANALYSIS_TIMEOUT_SECONDS: ${ANALYSIS_TIMEOUT_SECONDS}
      ANALYSIS_EVIDENCE_LIMIT: ${ANALYSIS_EVIDENCE_LIMIT}
    command:
      [
        "sh",
        "-c",
        "uv run --no-sync alembic -c /app/alembic.ini upgrade head && uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: buguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buguard"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
