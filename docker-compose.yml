services:
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/buguard
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-local-dev}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CACHE_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_LOGIN_ATTEMPTS: ${RATE_LIMIT_LOGIN_ATTEMPTS:-5}
      RATE_LIMIT_REFRESH_ATTEMPTS: ${RATE_LIMIT_REFRESH_ATTEMPTS:-10}
      RATE_LIMIT_BULK_IMPORT_ATTEMPTS: ${RATE_LIMIT_BULK_IMPORT_ATTEMPTS:-10}
      RATE_LIMIT_AI_ANALYSIS_ATTEMPTS: ${RATE_LIMIT_AI_ANALYSIS_ATTEMPTS:-5}
      ANALYSIS_PROVIDER: ${ANALYSIS_PROVIDER:-}
      ANALYSIS_MODEL: ${ANALYSIS_MODEL:-}
      ANALYSIS_API_KEY: ${ANALYSIS_API_KEY:-}
      ANALYSIS_BASE_URL: ${ANALYSIS_BASE_URL:-}
      ANALYSIS_HTTP_REFERER: ${ANALYSIS_HTTP_REFERER:-http://localhost:8000}
      ANALYSIS_APP_TITLE: ${ANALYSIS_APP_TITLE:-Buguard Asset Management}
      ANALYSIS_TIMEOUT_SECONDS: ${ANALYSIS_TIMEOUT_SECONDS:-30}
      ANALYSIS_EVIDENCE_LIMIT: ${ANALYSIS_EVIDENCE_LIMIT:-50}
    command:
      [
        "sh",
        "-c",
        "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: buguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buguard"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
