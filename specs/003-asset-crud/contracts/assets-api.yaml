openapi: 3.1.0
info:
  title: Buguard Asset Management Phase 3 Assets API
  version: 0.1.0
  description: >
    Contract for tenant-scoped asset CRUD, filtering, sorting, pagination,
    validation, RBAC, and structured asset domain errors.
paths:
  /assets:
    post:
      summary: Create or refresh one organization-owned asset observation
      operationId: createAsset
      tags: [Assets]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreate'
      responses:
        '201':
          description: Asset created under the authenticated user's organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '200':
          description: Existing asset observation refreshed without creating a duplicate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          description: Invalid asset payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User role cannot create assets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Concurrent write conflict with another asset observation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List organization-owned assets
      operationId: listAssets
      tags: [Assets]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AssetTypeFilter'
        - $ref: '#/components/parameters/AssetStatusFilter'
        - $ref: '#/components/parameters/TagFilter'
        - $ref: '#/components/parameters/SourceFilter'
        - $ref: '#/components/parameters/ValueContainsFilter'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated assets for the authenticated organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssets'
        '400':
          description: Invalid filter, sort, or pagination parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /assets/{asset_id}:
    get:
      summary: Get one organization-owned asset
      operationId: getAsset
      tags: [Assets]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Asset details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Asset is missing or outside the authenticated organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update one organization-owned asset
      operationId: updateAsset
      tags: [Assets]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetUpdate'
      responses:
        '200':
          description: Updated asset.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          description: Invalid update payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User role cannot update assets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Asset is missing or outside the authenticated organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Update would duplicate another asset in the organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Hard delete one organization-owned asset
      operationId: deleteAsset
      tags: [Assets]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '204':
          description: Asset was permanently deleted.
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User role cannot delete assets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Asset is missing or outside the authenticated organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AssetId:
      name: asset_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssetTypeFilter:
      name: type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AssetType'
    AssetStatusFilter:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AssetStatus'
    TagFilter:
      name: tag
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    SourceFilter:
      name: source
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    ValueContainsFilter:
      name: value_contains
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    SortBy:
      name: sort_by
      in: query
      required: false
      schema:
        type: string
        enum: [value, type, status, first_seen, last_seen, created_at]
        default: created_at
    SortOrder:
      name: sort_order
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    AssetType:
      type: string
      enum: [domain, subdomain, ip_address, service, certificate, technology]
    AssetStatus:
      type: string
      enum: [active, stale, archived]
    Asset:
      type: object
      required:
        - id
        - type
        - value
        - status
        - first_seen
        - last_seen
        - source
        - tags
        - metadata
        - created_at
        - updated_at
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/AssetType'
        value:
          type: string
        status:
          $ref: '#/components/schemas/AssetStatus'
        first_seen:
          type: string
          format: date-time
          description: Ignored when supplied; lifecycle timestamps are assigned by the server.
        last_seen:
          type: string
          format: date-time
          description: Ignored when supplied; lifecycle timestamps are assigned by the server.
        source:
          type: [string, 'null']
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AssetCreate:
      type: object
      required: [type, value]
      additionalProperties: false
      properties:
        type:
          $ref: '#/components/schemas/AssetType'
        value:
          type: string
          minLength: 1
        status:
          $ref: '#/components/schemas/AssetStatus'
          default: active
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time
        source:
          type: [string, 'null']
        tags:
          type: array
          items:
            type: string
          default: []
        metadata:
          type: object
          default: {}
    AssetUpdate:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        type:
          $ref: '#/components/schemas/AssetType'
        value:
          type: string
          minLength: 1
        status:
          $ref: '#/components/schemas/AssetStatus'
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time
        source:
          type: [string, 'null']
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
    PaginatedAssets:
      type: object
      required: [items, page, page_size, total, total_pages, has_next, has_previous]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0
        has_next:
          type: boolean
        has_previous:
          type: boolean
    ErrorResponse:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [code, message, details]
          additionalProperties: false
          properties:
            code:
              type: string
              examples: [ASSET_NOT_FOUND, DUPLICATE_ASSET, authorization_failed]
            message:
              type: string
            details:
              type: object
