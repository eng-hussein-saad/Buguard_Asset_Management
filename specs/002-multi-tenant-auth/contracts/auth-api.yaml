openapi: 3.1.0
info:
  title: Buguard Asset Management Phase 2 Auth API
  version: 0.1.0
  description: >
    Contract for seeded-user authentication, refresh-token rotation, logout,
    current-user lookup, tenant context, and RBAC foundations.
paths:
  /auth/login:
    post:
      summary: Log in as a seeded user
      operationId: login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded and issued access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Invalid credentials or inactive user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      summary: Rotate a refresh token and issue a new token pair
      operationId: refresh
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh succeeded; submitted refresh token is revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Refresh token is expired, revoked, malformed, unknown, or reused.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      summary: Revoke the submitted refresh token
      operationId: logout
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Refresh token was accepted for logout or already unusable.
        '401':
          description: Refresh token is malformed or unknown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me:
    get:
      summary: Return the current authenticated user
      operationId: getCurrentUser
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          description: Missing, malformed, expired, or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    RefreshRequest:
      type: object
      required: [refresh_token]
      additionalProperties: false
      properties:
        refresh_token:
          type: string
          minLength: 1
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      additionalProperties: false
      properties:
        access_token:
          type: string
          description: JWT containing user id, organization id, role, and exp.
        refresh_token:
          type: string
          description: Opaque refresh token returned once and stored only as a hash.
        token_type:
          type: string
          const: bearer
        expires_in:
          type: integer
          description: Access-token lifetime in seconds.
          example: 900
    CurrentUser:
      type: object
      required: [id, email, organization_id, role, is_active]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        organization_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [viewer, analyst, admin]
        is_active:
          type: boolean
    ErrorResponse:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [code, message, details]
          additionalProperties: false
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
