openapi: 3.1.0
info:
  title: Buguard Asset Management Phase 6 Test CI Rate Limits API
  version: 0.1.0
  description: >
    Contract additions and behavioral requirements for structured rate-limit
    responses and cached organization-scoped asset reads in Phase 6.
paths:
  /auth/login:
    post:
      summary: Authenticate a seeded user with login rate limiting
      operationId: loginWithRateLimit
      tags: [Auth]
      x-rate-limit:
        operation: login
        limit: 5
        window_seconds: 60
        effective_caller: attempted username plus client network identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token pair for valid credentials below the rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Login attempts exceeded 5 per minute for the effective caller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
  /auth/refresh:
    post:
      summary: Refresh tokens with authenticated-user rate limiting
      operationId: refreshWithRateLimit
      tags: [Auth]
      x-rate-limit:
        operation: refresh
        limit: 10
        window_seconds: 60
        effective_caller: authenticated user plus authenticated organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair below the rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Missing, expired, revoked, or invalid refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Refresh attempts exceeded 10 per minute for the effective caller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
  /assets:
    get:
      summary: List organization-owned assets with safe caching
      operationId: listAssetsCached
      tags: [Assets]
      security:
        - bearerAuth: []
      x-cache:
        cache_type: asset_list
        identity: authenticated organization plus all response-affecting query inputs
        invalidated_by:
          - asset create or refresh
          - asset update
          - asset delete or archive
          - bulk import
          - marking assets stale
          - relationship create or delete
        fallback: return correct uncached response if cache is unavailable
      parameters:
        - $ref: '#/components/parameters/AssetTypeQuery'
        - $ref: '#/components/parameters/AssetStatusQuery'
        - $ref: '#/components/parameters/TagQuery'
        - $ref: '#/components/parameters/SourceQuery'
        - $ref: '#/components/parameters/ValueContainsQuery'
        - $ref: '#/components/parameters/SortByQuery'
        - $ref: '#/components/parameters/SortOrderQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Organization-scoped paginated asset list from cache or database.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssets'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /assets/import:
    post:
      summary: Bulk-import organization-owned assets with import rate limiting
      operationId: importAssetsWithRateLimit
      tags: [Assets]
      security:
        - bearerAuth: []
      x-rate-limit:
        operation: bulk_import
        limit: 10
        window_seconds: 60
        effective_caller: authenticated user plus authenticated organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetImportBatch'
      responses:
        '200':
          description: All accepted records were imported or refreshed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetImportSummary'
        '207':
          description: Some records were accepted and some failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetImportSummary'
        '403':
          description: User role cannot import assets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Well-formed batch had no accepted records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetImportSummary'
        '429':
          description: Import attempts exceeded 10 per minute before import processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
  /assets/{asset_id}/graph:
    get:
      summary: Retrieve a one-hop organization-owned asset graph with safe caching
      operationId: getAssetGraphCached
      tags: [Relationships]
      security:
        - bearerAuth: []
      x-cache:
        cache_type: asset_graph
        identity: authenticated organization plus center asset id
        invalidated_by:
          - asset create or refresh
          - asset update
          - asset delete or archive
          - bulk import
          - marking assets stale
          - relationship create or delete
        fallback: return correct uncached response if cache is unavailable
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Organization-scoped graph from cache or database.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetGraph'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Center asset is missing or outside the authenticated organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AssetId:
      name: asset_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssetTypeQuery:
      name: type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AssetType'
    AssetStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [active, stale, archived]
    TagQuery:
      name: tag
      in: query
      required: false
      schema:
        type: string
    SourceQuery:
      name: source
      in: query
      required: false
      schema:
        type: string
    ValueContainsQuery:
      name: value_contains
      in: query
      required: false
      schema:
        type: string
    SortByQuery:
      name: sort_by
      in: query
      required: false
      schema:
        type: string
        enum: [created_at, updated_at, last_seen, value, type, status]
    SortOrderQuery:
      name: sort_order
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeQuery:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    RefreshRequest:
      type: object
      required: [refresh_token]
      additionalProperties: false
      properties:
        refresh_token:
          type: string
          minLength: 1
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          enum: [bearer]
        expires_in:
          type: integer
    AssetType:
      type: string
      enum: [domain, subdomain, ip_address, service, certificate, technology]
    PaginatedAssets:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
    Asset:
      type: object
      required: [id, type, value, status, tags, metadata, first_seen, last_seen, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/AssetType'
        value:
          type: string
        status:
          type: string
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AssetImportBatch:
      type: object
      required: [assets]
      properties:
        assets:
          type: array
          minItems: 1
          items:
            type: object
    AssetImportSummary:
      type: object
      required: [accepted, failed, created, updated, reactivated, errors]
      properties:
        accepted:
          type: integer
        failed:
          type: integer
        created:
          type: integer
        updated:
          type: integer
        reactivated:
          type: integer
        errors:
          type: array
          items:
            type: object
    AssetGraph:
      type: object
      required: [center, nodes, edges]
      properties:
        center:
          $ref: '#/components/schemas/GraphAsset'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphAsset'
        edges:
          type: array
          items:
            type: object
    GraphAsset:
      type: object
      required: [id, type, value, label]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/AssetType'
        value:
          type: string
        label:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
    RateLimitError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              type: object
              properties:
                code:
                  type: string
                  enum: [rate_limited]
                details:
                  type: object
                  properties:
                    operation:
                      type: string
                    retry_after_seconds:
                      type: integer
