openapi: 3.1.0
info:
  title: Buguard Asset Management Phase 4 Bulk Import API
  version: 0.1.0
  description: >
    Contract for tenant-scoped bulk asset import, deduplication, lifecycle
    refresh, partial import failures, and stale marking through the existing
    asset update route.
paths:
  /assets/import:
    post:
      summary: Import organization-owned asset observations
      operationId: importAssets
      tags: [Assets]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetImportBatch'
      responses:
        '200':
          description: All import records were accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetImportSummary'
        '207':
          description: At least one record was accepted and at least one failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetImportSummary'
        '400':
          description: Invalid request envelope or malformed JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User role cannot import assets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Well-formed batch had no accepted records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetImportSummary'
  /assets/{asset_id}:
    patch:
      summary: Update one organization-owned asset, including marking stale
      operationId: updateAsset
      tags: [Assets]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetUpdate'
            examples:
              markStale:
                summary: Mark an active asset stale
                value:
                  status: stale
      responses:
        '200':
          description: Updated asset.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          description: Invalid update payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User role cannot update asset status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Asset is missing or outside the authenticated organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Update would duplicate another asset in the organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AssetId:
      name: asset_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    AssetType:
      type: string
      enum: [domain, subdomain, ip_address, service, certificate, technology]
    AssetStatus:
      type: string
      enum: [active, stale, archived]
    AssetImportBatch:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/AssetImportRecord'
    AssetImportRecord:
      type: object
      required: [type, value]
      additionalProperties: false
      properties:
        type:
          $ref: '#/components/schemas/AssetType'
        value:
          type: string
          minLength: 1
        status:
          $ref: '#/components/schemas/AssetStatus'
          default: active
        source:
          type: [string, 'null']
        tags:
          type: array
          items:
            type: string
          default: []
        metadata:
          type: object
          default: {}
      description: >
        organization_id and lifecycle timestamps are not accepted. Asset
        ownership and first_seen/last_seen values are controlled by the server.
    AssetImportSummary:
      type: object
      required: [created, updated, failed, errors]
      additionalProperties: false
      properties:
        created:
          type: integer
          minimum: 0
        updated:
          type: integer
          minimum: 0
        failed:
          type: integer
          minimum: 0
        errors:
          type: array
          items:
            $ref: '#/components/schemas/AssetImportError'
    AssetImportError:
      type: object
      required: [index, reason]
      additionalProperties: false
      properties:
        index:
          type: integer
          minimum: 0
        reason:
          type: string
          minLength: 1
    Asset:
      type: object
      required:
        - id
        - type
        - value
        - status
        - first_seen
        - last_seen
        - source
        - tags
        - metadata
        - created_at
        - updated_at
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/AssetType'
        value:
          type: string
        status:
          $ref: '#/components/schemas/AssetStatus'
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time
        source:
          type: [string, 'null']
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AssetUpdate:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        type:
          $ref: '#/components/schemas/AssetType'
        value:
          type: string
          minLength: 1
        status:
          $ref: '#/components/schemas/AssetStatus'
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time
        source:
          type: [string, 'null']
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
    ErrorResponse:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [code, message, details]
          additionalProperties: false
          properties:
            code:
              type: string
              examples: [ASSET_NOT_FOUND, authorization_failed]
            message:
              type: string
            details:
              type: object
